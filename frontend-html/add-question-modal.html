  <script>
    // Helpers used by the modal initializer
    const QA_PREVIEW_PLACEHOLDER = 'data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22100%25%22%20height%3D%22100%25%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23fafafa%22/%3E%3C/svg%3E';
    function _qa_looksLikeUrl(s){
      if (!s) return false;
      try{
        if (/^data:/i.test(s)) return true;
        if (/^https?:\/\//i.test(s)) return true;
        if (/^\//.test(s)) return true; // root-relative paths
        if (/\.(png|jpe?g|gif|svg|webp)(\?.*)?$/i.test(String(s).trim())) return true;
      }catch(e){}
      return false;
    }
    function _qa_splitUrls(s){ if (!s) return []; return s.split(/\s+|\|,|,\s*/).map(x=>x.trim()).filter(x=>x.length && /https?:\/\//i.test(x)); }
    function _qa_hasPreview(img){
      try{
        if (!img) return false;
        const srcAttr = (img.getAttribute && img.getAttribute('src')) || '';
        const src = img.src || srcAttr || '';
        if (!src || String(src).trim() === '') return false;
        // Consider data:, http(s), root-relative and common image filenames as valid
        // Don't treat the UI placeholder as a real preview
        if (String(src).trim() === String(QA_PREVIEW_PLACEHOLDER).trim()) return false;
        if (_qa_looksLikeUrl(src)){
          if (img.complete === true){ try{ if (typeof img.naturalWidth === 'number' && img.naturalWidth > 0) return true; }catch(_){ }
          }
          return true;
        }
        return false;
      }catch(e){ return false; }
    }

    // Update view button visibility for previews inside the modal element
    window.updateModalViewButtons = function(modalEl){
      if (!modalEl) modalEl = document;
      const pairs = [ ['qa_image_preview','qa_image_view'], ['qa_opt_a_preview','qa_opt_a_view'], ['qa_opt_b_preview','qa_opt_b_view'], ['qa_opt_c_preview','qa_opt_c_view'], ['qa_opt_d_preview','qa_opt_d_view'], ['qa_opt_e_preview','qa_opt_e_view'] ];
      const isValidPreview = (img)=> _qa_hasPreview(img);
      for (const [p,b] of pairs){
        const img = modalEl.querySelector('#'+p) || document.getElementById(p);
        const btn = modalEl.querySelector('#'+b) || document.getElementById(b);
        const base = p.replace('_preview','');
        const browse = modalEl.querySelector('#'+base + '_browse') || document.getElementById(base + '_browse');
        const remove = modalEl.querySelector('#'+base + '_remove') || document.getElementById(base + '_remove');
        if (!btn && !browse && !remove) continue;
        try{
          const visible = isValidPreview(img);
          if (btn) btn.style.display = visible ? 'inline-block' : 'none';
          if (remove) remove.style.display = visible ? 'inline-block' : 'none';
          if (browse) {
            // Always show Browse so users can change/replace the file even when a preview exists.
            browse.style.display = 'inline-block';
          }
        }catch(e){ if (btn) btn.style.display = 'none'; if (remove) remove.style.display = 'none'; if (browse) browse.style.display = 'inline-block'; }
      }
    };

    function _qa_apiBase(){
      return `${location.protocol}//${location.hostname}:8000`;
    }

    function _qa_storeEl(modalEl, base){
      if (base === 'qa_image') return modalEl.querySelector('#qa_image_src') || document.getElementById('qa_image_src');
      return modalEl.querySelector('#' + base) || document.getElementById(base);
    }

    function _qa_previewEl(modalEl, base){
      return modalEl.querySelector('#' + base + '_preview') || document.getElementById(base + '_preview');
    }

    function _qa_fileEl(modalEl, base){
      return modalEl.querySelector('#' + base + '_file') || document.getElementById(base + '_file');
    }

    function _qa_questionId(modalEl){
      const el = modalEl.querySelector('#question_id') || document.getElementById('question_id');
      return (el && el.value ? String(el.value).trim().toUpperCase() : '');
    }

    function _qa_prefixFromQid(qid){
      return String(qid || '').replace(/\d+$/,'').toUpperCase();
    }

    function _qa_fieldMeta(base, qid){
      const prefix = _qa_prefixFromQid(qid) || 'QA';
      const map = {
        qa_image: { fieldKey: 'image_url', fileName: `${prefix}-Question.webp` },
        qa_opt_a: { fieldKey: 'opt_a', fileName: `${prefix}-OPT-A.webp` },
        qa_opt_b: { fieldKey: 'opt_b', fileName: `${prefix}-OPT-B.webp` },
        qa_opt_c: { fieldKey: 'opt_c', fileName: `${prefix}-OPT-C.webp` },
        qa_opt_d: { fieldKey: 'opt_d', fileName: `${prefix}-OPT-D.webp` },
        qa_opt_e: { fieldKey: 'opt_e', fileName: `${prefix}-OPT-E.webp` },
      };
      const meta = map[base] || { fieldKey: '', fileName: `${prefix}-Asset.webp` };
      return {
        ...meta,
        tempPath: qid ? `Temp/${qid} ${meta.fileName}` : `Temp/${meta.fileName}`
      };
    }

    function _qa_existingCanonicalUrl(modalEl, base, row){
      const store = _qa_storeEl(modalEl, base);
      const original = ((store && store.dataset && store.dataset.originalUrl) || '').trim();
      if (_qa_looksLikeUrl(original)) return original;

      if (base === 'qa_image'){
        const hidVal = ((store && store.value) || '').trim();
        if (_qa_looksLikeUrl(hidVal)) return hidVal;
        const rowVal = row && (row.image_url || row.image || row.question_image || '');
        return _qa_looksLikeUrl(rowVal) ? String(rowVal).trim() : '';
      }

      const current = ((store && store.dataset && store.dataset.imageValue) || '').trim();
      if (_qa_looksLikeUrl(current)) return current;

      const meta = _qa_fieldMeta(base, _qa_questionId(modalEl));
      const rowVal = row && row[meta.fieldKey];
      return _qa_looksLikeUrl(rowVal || '') ? String(rowVal).trim() : '';
    }

    async function _qa_postJson(path, payload){
      const res = await fetch(`${_qa_apiBase()}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {})
      });
      let data = null;
      try{ data = await res.json(); }catch(_){}
      if (!res.ok){
        throw new Error((data && (data.detail || data.error)) || `Request failed: ${res.status}`);
      }
      return data || {};
    }

    function _qa_assetTypeFromFileId(fId){
      const map = {
        'qa_image_file': 'question',
        'qa_opt_a_file': 'opt_a',
        'qa_opt_b_file': 'opt_b',
        'qa_opt_c_file': 'opt_c',
        'qa_opt_d_file': 'opt_d',
        'qa_opt_e_file': 'opt_e',
      };
      return map[fId] || '';
    }

    function _qa_assetTypeFromBase(base){
      const map = {
        'qa_image': 'question',
        'qa_opt_a': 'opt_a',
        'qa_opt_b': 'opt_b',
        'qa_opt_c': 'opt_c',
        'qa_opt_d': 'opt_d',
        'qa_opt_e': 'opt_e',
      };
      return map[base] || '';
    }

    function _qa_prefixFromQuestionId(questionId){
      const q = String(questionId || '').trim().toUpperCase();
      const m = q.match(/^([A-Z]+)/);
      return m ? m[1] : '';
    }

    function _qa_filenameBase(questionId, assetType){
      const prefix = _qa_prefixFromQuestionId(questionId);
      if (!prefix) return '';
      const suffixMap = {
        'question': 'Question',
        'opt_a': 'OPT-A',
        'opt_b': 'OPT-B',
        'opt_c': 'OPT-C',
        'opt_d': 'OPT-D',
        'opt_e': 'OPT-E',
      };
      const suffix = suffixMap[String(assetType || '').toLowerCase()];
      return suffix ? `${prefix}-${suffix}` : '';
    }

    function _qa_tempPath(questionId, assetType){
      const base = _qa_filenameBase(questionId, assetType);
      if (!base) return '';
      return `Temp/${String(questionId || '').trim().toUpperCase()} ${base}.webp`;
    }

    function _qa_finalPath(questionId, assetType){
      const base = _qa_filenameBase(questionId, assetType);
      if (!base) return '';
      return `${String(questionId || '').trim().toUpperCase()}/${base}.webp`;
    }

    function _qa_publicUrlForPath(path){
      const clean = String(path || '').trim();
      if (!clean) return '';
      return `${_qa_apiBase().replace(/:\d+$/, '').replace(/\/$/, '')}`; // placeholder
    }

    function _qa_bucketPublicUrl(path){
      const clean = String(path || '').trim();
      if (!clean) return '';
      const origin = window.SUPABASE_URL || (window.supabaseConfig && window.supabaseConfig.supabaseUrl) || '';
      if (!origin) return '';
      return `${String(origin).replace(/\/$/, '')}/storage/v1/object/public/msa-images/${encodeURI(clean).replace(/%2F/g,'/')}`;
    }

    function _qa_stateEl(modalEl, assetType){
      const map = {
        'question': modalEl.querySelector('#qa_image_src') || document.getElementById('qa_image_src'),
        'opt_a': modalEl.querySelector('#qa_opt_a') || document.getElementById('qa_opt_a'),
        'opt_b': modalEl.querySelector('#qa_opt_b') || document.getElementById('qa_opt_b'),
        'opt_c': modalEl.querySelector('#qa_opt_c') || document.getElementById('qa_opt_c'),
        'opt_d': modalEl.querySelector('#qa_opt_d') || document.getElementById('qa_opt_d'),
        'opt_e': modalEl.querySelector('#qa_opt_e') || document.getElementById('qa_opt_e'),
      };
      return map[String(assetType || '').toLowerCase()] || null;
    }

    async function _qa_stageTempUpload(modalEl, file, category, assetType, questionId){
      const formData = new FormData();
      formData.append("file", file);
      formData.append("category", category || '');
      formData.append("asset_type", assetType || '');
      formData.append("question_id", questionId || '');
      formData.append("staging", "1");

      const res = await fetch(`${location.protocol}//${location.hostname}:8000/upload-question-image`, {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      if (!res.ok){
        throw new Error(data.detail || data.error || 'Temp upload failed');
      }
      const stateEl = _qa_stateEl(modalEl, assetType);
      if (stateEl && stateEl.dataset){
        stateEl.dataset.tempPath = data.path || _qa_tempPath(questionId, assetType);
        stateEl.dataset.tempPublicUrl = data.public_url || '';
        stateEl.dataset.finalPath = _qa_finalPath(questionId, assetType);
        stateEl.dataset.finalPublicUrl = _qa_bucketPublicUrl(_qa_finalPath(questionId, assetType));
        stateEl.dataset.assetType = assetType;
      }
      return data;
    }

    async function _qa_deleteTempForAsset(modalEl, assetType){
      const stateEl = _qa_stateEl(modalEl, assetType);
      const tempPath = stateEl && stateEl.dataset ? (stateEl.dataset.tempPath || '') : '';
      if (!tempPath) return;
      try{
        await _qa_postJson('/delete_object', { bucket: 'msa-images', path: tempPath });
      }catch(_){}
      if (stateEl && stateEl.dataset){
        delete stateEl.dataset.tempPath;
        delete stateEl.dataset.tempPublicUrl;
        delete stateEl.dataset.finalPath;
        delete stateEl.dataset.finalPublicUrl;
        delete stateEl.dataset.assetType;
        delete stateEl.dataset.imageValue;
      }
    }

    async function _qa_cleanupAllTemp(modalEl){
      const assets = ['question','opt_a','opt_b','opt_c','opt_d','opt_e'];
      for (const assetType of assets){
        await _qa_deleteTempForAsset(modalEl, assetType);
      }
    }
    window.cleanupQuestionModalTemp = _qa_cleanupAllTemp;

    async function _qa_promoteTempIfAny(modalEl, assetType){
      const stateEl = _qa_stateEl(modalEl, assetType);
      const tempPath = stateEl && stateEl.dataset ? (stateEl.dataset.tempPath || '') : '';
      const finalPath = stateEl && stateEl.dataset ? (stateEl.dataset.finalPath || '') : '';
      if (!tempPath || !finalPath){
        return stateEl && stateEl.dataset ? (stateEl.dataset.finalPublicUrl || stateEl.dataset.tempPublicUrl || '') : '';
      }
      const data = await _qa_postJson('/promote_object', {
        bucket: 'msa-images',
        from_path: tempPath,
        to_path: finalPath,
        delete_source: true
      });
      const finalPublicUrl = (data && (data.public_url || data.new_public_url)) || _qa_bucketPublicUrl(finalPath);
      if (stateEl && stateEl.dataset){
        // Keep tempPath for fallback cleanup if the backend promoted the file
        // but failed to delete the temp source object.
        stateEl.dataset.finalPublicUrl = finalPublicUrl || '';
        stateEl.dataset.tempPublicUrl = '';
        stateEl.dataset.promoteDeletePending = '1';
      }
      return finalPublicUrl || '';
    }

    async function _qa_moveCurrentToTemp(modalEl, base, row){
      const store = _qa_storeEl(modalEl, base);
      if (!store) return null;

      const qid = _qa_questionId(modalEl);
      if (!qid) return null;

      const meta = _qa_fieldMeta(base, qid);
      if (store.dataset && store.dataset.tempPath) return store.dataset.tempPath;

      const existingUrl = _qa_existingCanonicalUrl(modalEl, base, row);
      if (!_qa_looksLikeUrl(existingUrl)) return null;

      await _qa_postJson('/promote_object', {
        public_url: existingUrl,
        to_path: meta.tempPath,
        delete_source: true
      });

      if (store.dataset){
        store.dataset.originalUrl = existingUrl;
        store.dataset.tempPath = meta.tempPath;
      }
      return meta.tempPath;
    }

    async function _qa_restoreTemp(modalEl, base){
      const store = _qa_storeEl(modalEl, base);
      if (!store || !store.dataset) return;

      const tempPath = (store.dataset.tempPath || '').trim();
      const originalUrl = (store.dataset.originalUrl || '').trim();
      if (!tempPath || !originalUrl) return;

      await _qa_postJson('/promote_object', {
        bucket: 'msa-images',
        from_path: tempPath,
        target_public_url: originalUrl,
        delete_source: true
      });

      store.dataset.tempPath = '';
      store.dataset.removed = '0';
    }

    async function _qa_deleteTemp(modalEl, base){
      const store = _qa_storeEl(modalEl, base);
      if (!store || !store.dataset) return;

      const tempPath = (store.dataset.tempPath || '').trim();
      if (!tempPath) return;

      await _qa_postJson('/delete_object', {
        bucket: 'msa-images',
        path: tempPath
      });

      store.dataset.tempPath = '';
      store.dataset.originalUrl = '';
      store.dataset.removed = '0';
    }

    function _qa_publicUrlToBucketPath(url){
      const raw = String(url || '').trim();
      if (!raw) return '';
      try{
        const marker = '/storage/v1/object/public/msa-images/';
        const idx = raw.indexOf(marker);
        if (idx >= 0){
          return decodeURIComponent(raw.slice(idx + marker.length).split('?')[0]);
        }
      }catch(_){}
      return '';
    }

    async function _qa_deleteOriginalIfNeeded(modalEl, base, nextUrl){
      const store = _qa_storeEl(modalEl, base);
      if (!store || !store.dataset) return;

      const originalUrl = String(store.dataset.originalUrl || '').trim();
      const next = String(nextUrl || '').trim();
      const removed = String(store.dataset.removed || '0') === '1';

      if (!originalUrl) return;
      if (!removed && (!next || next === originalUrl)) return;
      if (next && next === originalUrl) return;

      const originalPath = _qa_publicUrlToBucketPath(originalUrl);
      if (!originalPath) return;

      try{
        await _qa_postJson('/delete_object', {
          bucket: 'msa-images',
          path: originalPath
        });

        console.warn('delete original failed', { base, originalPath, err });

                  const cached = (window.questionsCache && Array.isArray(window.questionsCache[category || '']))

                  const nums = [];
                  const re = new RegExp('^' + p + '(\\d+)$','i');
                  for (const r of cached){

                    const m = idv.match(re);

                      if (!Number.isNaN(n)) nums.push(n);
                    }
                  }

                  nums.sort((a,b)=>a-b);
                  let next = 1;
                  for (let i=0;i<nums.length;i++){

              optional: false,
              hasText: !!optionDText || (!!optD && !_qa_looksLikeUrl(optD)),
              hasImage: !!dFile || hasPreview('#qa_opt_d_preview') || (!!optD && _qa_looksLikeUrl(optD)),
            },
            {
              label: 'E',
              optional: true,
              hasText: !!optionEText || (!!optE && !_qa_looksLikeUrl(optE)),
              hasImage: !!eFile || hasPreview('#qa_opt_e_preview') || (!!optE && _qa_looksLikeUrl(optE)),
            },
          ];

          for (const opt of optionChecks) {
            if (opt.hasText && opt.hasImage) {
              setMsg(`Only either Text or Image has to be inputted for Option ${opt.label}.`);
              saveBtn.disabled = false;
              saveBtn.textContent = _origSaveText;
              return;
            }

            if (!opt.optional && !opt.hasText && !opt.hasImage) {
              setMsg(`Option ${opt.label} must have either Text or Image.`);
              saveBtn.disabled = false;
              saveBtn.textContent = _origSaveText;
              return;
            }
          }

          const answerToOptionState = Object.fromEntries(
            optionChecks.map(opt => [opt.label, { hasText: opt.hasText, hasImage: opt.hasImage }])
          );
          const selectedAnswer = (((modalEl.querySelector('#qa_correct_answer') || document.getElementById('qa_correct_answer'))?.value) || '').trim().toUpperCase();
          if (selectedAnswer && answerToOptionState[selectedAnswer] && !answerToOptionState[selectedAnswer].hasText && !answerToOptionState[selectedAnswer].hasImage) {
            setMsg(`Correct answer ${selectedAnswer} has no input yet. Add either Text or Image for Option ${selectedAnswer}.`);
            saveBtn.disabled = false;
            saveBtn.textContent = _origSaveText;
            return;
          }

          const qState = _qa_stateEl(modalEl, 'question');
          const aState = _qa_stateEl(modalEl, 'opt_a');
          const bState = _qa_stateEl(modalEl, 'opt_b');
          const cState = _qa_stateEl(modalEl, 'opt_c');
          const dState = _qa_stateEl(modalEl, 'opt_d');
          const eState = _qa_stateEl(modalEl, 'opt_e');

          if (qState && qState.dataset && qState.dataset.tempPath) imageUrl = await _qa_promoteTempIfAny(modalEl, 'question');
          if (aState && aState.dataset && aState.dataset.tempPath) optA = await _qa_promoteTempIfAny(modalEl, 'opt_a');
          if (bState && bState.dataset && bState.dataset.tempPath) optB = await _qa_promoteTempIfAny(modalEl, 'opt_b');
          if (cState && cState.dataset && cState.dataset.tempPath) optC = await _qa_promoteTempIfAny(modalEl, 'opt_c');
          if (dState && dState.dataset && dState.dataset.tempPath) optD = await _qa_promoteTempIfAny(modalEl, 'opt_d');
          if (eState && eState.dataset && eState.dataset.tempPath) optE = await _qa_promoteTempIfAny(modalEl, 'opt_e');

          const payload = {
            question_id: ((modalEl.querySelector('#question_id') || document.getElementById('question_id')) && (modalEl.querySelector('#question_id') || document.getElementById('question_id')).value) || null,
            question: (modalEl.querySelector('#qa_question') || document.getElementById('qa_question')).value,
            long_text: (modalEl.querySelector('#qa_long_text') || document.getElementById('qa_long_text')) ? (modalEl.querySelector('#qa_long_text') || document.getElementById('qa_long_text')).value : null,
            opt_a: optA,
            opt_b: optB,
            opt_c: optC,
            opt_d: optD,
            opt_e: optE,
            answer: ((modalEl.querySelector('#qa_correct_answer') || document.getElementById('qa_correct_answer')) && (modalEl.querySelector('#qa_correct_answer') || document.getElementById('qa_correct_answer')).value) || null,
            image_url: imageUrl,
            created_at: (new Date()).toISOString(),
            created_by: createdBy || null
          };

          if (mode === 'add'){
            const r = await fetch(`${location.protocol}//${location.hostname}:8000/questions?category=${encodeURIComponent(category)}`, {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify(payload)
            });

            if (!r.ok){
              let text = r.status + '';
              try{
                const body = await r.text();
                if (body) text = body;
              }catch(_){}
              setMsg('Error saving: ' + text, false);
              return;
            }

            const tempBases = ['qa_image','qa_opt_a','qa_opt_b','qa_opt_c','qa_opt_d','qa_opt_e'];
            for (const base of tempBases){
              try{ await _qa_deleteTemp(modalEl, base); }catch(_){}
            }

            setMsg('Added successfully', true);
            reloadScheduled = true;

            try {
              if (typeof window.loadQuestions === 'function') {
                await window.loadQuestions(category);
              }
            } catch (e) {
              console.error('loadQuestions failed after add', e);
            }

            try {
              const container = modalEl.closest('.qa-modal') || modalEl;
              if (container && container.parentNode) container.parentNode.removeChild(container);
              else modalEl.style.display = 'none';
            } catch (e) {}
          } else {
            const id = row && (row.id || row.question_id);
            const r = await fetch(`${location.protocol}//${location.hostname}:8000/questions/${encodeURIComponent(id)}?category=${encodeURIComponent(category)}`, {
              method:'PATCH',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify(payload)
            });

            if (!r.ok){
              let text = r.status + '';
              try{
                const body = await r.text();
                if (body) text = body;
              }catch(_){}
              setMsg('Error updating: ' + text, false);
              return;
            }

            await _qa_deleteOriginalIfNeeded(modalEl, 'qa_image', imageUrl || '');
            await _qa_deleteOriginalIfNeeded(modalEl, 'qa_opt_a', optA || '');
            await _qa_deleteOriginalIfNeeded(modalEl, 'qa_opt_b', optB || '');
            await _qa_deleteOriginalIfNeeded(modalEl, 'qa_opt_c', optC || '');
            await _qa_deleteOriginalIfNeeded(modalEl, 'qa_opt_d', optD || '');
            await _qa_deleteOriginalIfNeeded(modalEl, 'qa_opt_e', optE || '');

            const tempBases = ['qa_image','qa_opt_a','qa_opt_b','qa_opt_c','qa_opt_d','qa_opt_e'];
            for (const base of tempBases){
              try{ await _qa_deleteTemp(modalEl, base); }catch(_){}
            }

            setMsg('Updated successfully', true);
            reloadScheduled = true;

            try {
              if (typeof window.loadQuestions === 'function') {
                await window.loadQuestions(category);
              }
            } catch (e) {
              console.error('loadQuestions failed after update', e);
            }

            try {
              const container = modalEl.closest('.qa-modal') || modalEl;
              if (container && container.parentNode) container.parentNode.removeChild(container);
              else modalEl.style.display = 'none';
            } catch (e) {}
          }

        }catch(e){
          console.error(e);
          setMsg('Error saving: ' + (e.message || 'Unknown error'), false);
        }finally{
          try{
            if (!reloadScheduled){
              saveBtn.disabled = false;
              saveBtn.textContent = _origSaveText;
            }
          }catch(_){}
        }
        });
      }

      // finally ensure view buttons are correct
      if (window.updateModalViewButtons) updateModalViewButtons(modalEl);
    };
  </script>
