<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Attempt</title>
    <style>
      :root{
        --bg: #071326;
        --panel: rgba(11, 24, 45, 0.92);
        --panel-2: rgba(15, 31, 57, 0.96);
        --line: rgba(148, 163, 184, 0.16);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #818cf8;
        --accent-soft: rgba(99, 102, 241, 0.16);
        --shadow: 0 20px 40px rgba(2, 6, 23, 0.35);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body{
        margin:0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(14, 165, 233, 0.10), transparent 24%),
          linear-gradient(180deg, #06111f, #08172b 28%, #06111f 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .page {
        width: min(1380px, calc(100% - clamp(28px, 4vw, 72px)));
        margin: clamp(16px, 2.4vw, 32px) auto clamp(36px, 4vw, 64px);
      }

      .hero {
        background: linear-gradient(180deg, rgba(10, 24, 48, 0.98), rgba(8, 19, 38, 0.98));
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero-head {
        padding: clamp(18px, 2.2vw, 24px);
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      }

      .hero-topbar {
        display:flex;
        gap: 12px;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .eyebrow {
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(129, 140, 248, 0.32);
        background: rgba(99, 102, 241, 0.12);
        color: #dbeafe;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 8px;
        font-size: clamp(1.65rem, 3vw, 2.3rem);
        line-height: 1.15;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .hero-actions {
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        appearance:none;
        border:none;
        outline:none;
        cursor:pointer;
        padding: 11px 16px;
        border-radius: 14px;
        font-size: 0.95rem;
        font-weight: 700;
        text-decoration:none;
        transition: transform 0.15s ease, opacity 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }

      .btn:hover { transform: translateY(-1px); }
      .btn-secondary {
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: linear-gradient(180deg, rgba(30, 41, 59, 0.72), rgba(15, 23, 42, 0.92));
      }

      .summary-grid {
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
        gap: clamp(12px, 1.6vw, 16px);
        padding: clamp(16px, 2vw, 20px) clamp(18px, 2.2vw, 24px) 0;
      }

      .summary-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(14, 27, 50, 0.95), rgba(10, 22, 41, 0.95));
        padding: clamp(14px, 1.6vw, 18px);
        min-height: 92px;
      }

      .summary-label {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .summary-value {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 800;
      }

      .toolbar {
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        padding: clamp(16px, 2vw, 20px) clamp(18px, 2.2vw, 24px) clamp(18px, 2.4vw, 24px);
      }

      .chip {
        border: 1px solid rgba(129, 140, 248, 0.28);
        background: rgba(99, 102, 241, 0.10);
        color: #e2e8f0;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 0.92rem;
        font-weight: 700;
        text-decoration:none;
        transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
      }

      .chip:hover,
      .chip:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(129, 140, 248, 0.62);
        background: rgba(99, 102, 241, 0.22);
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.18);
        color: #ffffff;
        outline: none;
      }

      .content {
        margin-top: clamp(16px, 2vw, 18px);
        display:grid;
        gap: clamp(16px, 2vw, 20px);
      }

      .section {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(12, 26, 48, 0.95), rgba(8, 19, 37, 0.95));
        box-shadow: var(--shadow);
        overflow:hidden;
      }

      .section-head {
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        flex-wrap:wrap;
        padding: clamp(16px, 1.8vw, 20px) clamp(18px, 2vw, 22px);
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      }

      .section-title {
        margin:0;
        font-size: 1.22rem;
      }

      .section-meta {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .question-list {
        display:grid;
        gap: clamp(12px, 1.6vw, 16px);
        padding: clamp(16px, 1.8vw, 20px);
      }

      .question-card {
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(10, 22, 41, 0.86), rgba(12, 27, 49, 0.96));
        padding: clamp(14px, 1.6vw, 18px);
      }

      .question-head {
        display:flex;
        justify-content: space-between;
        gap: 10px;
        align-items:flex-start;
        flex-wrap:wrap;
        margin-bottom: 10px;
      }

      .question-order {
        display:inline-flex;
        align-items:center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.10);
        color: #e2e8f0;
        font-size: 0.86rem;
        font-weight: 700;
      }

      .question-id {
        color: var(--muted);
        font-size: 0.84rem;
      }

      .question-text {
        margin: 0;
        color: var(--text);
        line-height: 1.6;
      }

      .question-image,
      .answer-image {
        display:block;
        max-width: min(100%, 420px);
        max-height: 260px;
        width:auto;
        height:auto;
        object-fit: contain;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(7, 18, 39, 0.4);
        margin-top: 14px;
      }

      .answer-box {
        margin-top: 16px;
        border: 1px solid rgba(99, 102, 241, 0.28);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(30, 41, 97, 0.38), rgba(20, 35, 74, 0.48));
        padding: 14px;
      }

      .answer-label {
        margin: 0 0 8px;
        color: #c7d2fe;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .answer-value {
        margin: 0;
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
        line-height: 1.55;
        font-weight: 700;
      }

      .answer-key {
        display:inline-flex;
        align-items:center;
        justify-content:center;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: #c7d2fe;
        color: #1e293b;
        font-size: 0.88rem;
        font-weight: 800;
        flex-shrink: 0;
      }

      .empty-state {
        margin-top: 18px;
        border: 1px dashed rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        background: rgba(11, 24, 45, 0.72);
        padding: 22px;
        color: var(--muted);
        line-height: 1.7;
      }

      .hidden { display:none !important; }

      .to-top-btn {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 50;
        width: 52px;
        height: 52px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        font-size: 1.2rem;
        box-shadow: 0 14px 26px rgba(2, 6, 23, 0.32);
        opacity: 0;
        visibility: hidden;
        transform: translateY(10px);
        transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease, border-color 0.15s ease, background 0.15s ease;
      }

      .to-top-btn.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      @media (max-width: 900px) {
        .page {
          width: calc(100% - 28px);
          margin: 14px auto 40px;
        }

        .summary-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .hero-topbar,
        .section-head,
        .question-head {
          align-items: stretch;
        }

        .btn,
        .hero-actions {
          width: 100%;
        }

        .hero-actions .btn {
          width: 100%;
          text-align: center;
        }

        .to-top-btn {
          right: 14px;
          bottom: 14px;
          width: 48px;
          height: 48px;
        }
      }
      @media (min-width: 1700px) {
        .page {
          width: min(1480px, calc(100% - 96px));
        }
      }

      @media (max-width: 720px) {
        .page {
          width: calc(100% - 24px);
          margin: 12px auto 32px;
        }
      }

    
      .result-badge {
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-height: 30px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .result-badge.correct {
        background: rgba(34, 197, 94, 0.18);
        border: 1px solid rgba(34, 197, 94, 0.34);
        color: #bbf7d0;
      }

      .result-badge.wrong {
        background: rgba(239, 68, 68, 0.16);
        border: 1px solid rgba(239, 68, 68, 0.30);
        color: #fecaca;
      }

      .result-badge.neutral {
        background: rgba(148, 163, 184, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.20);
        color: #e2e8f0;
      }

      .choice-list {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      .choice-item {
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 14px;
        background: rgba(9, 19, 37, 0.72);
        padding: 12px 14px;
      }

      .choice-item.selected {
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.12) inset;
      }

      .choice-item.selected-correct {
        border-color: rgba(34, 197, 94, 0.42);
        background: linear-gradient(180deg, rgba(20, 83, 45, 0.30), rgba(10, 22, 41, 0.86));
      }

      .choice-item.selected-wrong {
        border-color: rgba(239, 68, 68, 0.38);
        background: linear-gradient(180deg, rgba(127, 29, 29, 0.26), rgba(10, 22, 41, 0.86));
      }

      .choice-item.correct-answer {
        border-color: rgba(34, 197, 94, 0.30);
        background: linear-gradient(180deg, rgba(10, 55, 35, 0.22), rgba(9, 19, 37, 0.78));
      }

      .choice-head {
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        flex-wrap:wrap;
        margin-bottom: 6px;
      }

      .choice-key {
        display:inline-flex;
        align-items:center;
        justify-content:center;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(199, 210, 254, 0.92);
        color: #1e293b;
        font-size: 0.88rem;
        font-weight: 800;
      }

      .choice-tags {
        display:flex;
        gap: 8px;
        flex-wrap:wrap;
      }

      .choice-tag {
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-height: 26px;
        padding: 4px 9px;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .choice-tag.selected {
        background: rgba(99, 102, 241, 0.18);
        border: 1px solid rgba(129, 140, 248, 0.36);
        color: #c7d2fe;
      }

      .choice-tag.correct {
        background: rgba(34, 197, 94, 0.18);
        border: 1px solid rgba(34, 197, 94, 0.32);
        color: #bbf7d0;
      }

      .choice-tag.wrong {
        background: rgba(239, 68, 68, 0.16);
        border: 1px solid rgba(239, 68, 68, 0.28);
        color: #fecaca;
      }

      .choice-text {
        color: #e5edf9;
        line-height: 1.55;
      }

    </style>
  </head>
  <body data-page="view-attempt">
    <main class="page">
      <section class="hero">
        <div class="hero-head">
          <div class="hero-topbar">
            <div>
              <span class="eyebrow">Read-Only Attempt Review</span>
              <h1 id="pageTitle">View Attempt</h1>
              <p id="pageSubtitle" class="subtitle">Review grouped by category showing the answer recorded for this attempt.</p>
            </div>
            <div class="hero-actions">
              <a class="btn btn-secondary" href="user-dashboard.html">Back to Dashboard</a>
            </div>
          </div>
        </div>

        <div class="summary-grid">
          <article class="summary-card">
            <p class="summary-label">Categories</p>
            <p id="categoryCountValue" class="summary-value">-</p>
          </article>
          <article class="summary-card">
            <p class="summary-label">Overall Total Score</p>
            <p id="answeredCountValue" class="summary-value">-</p>
          </article>
        </div>

        <nav id="categoryToolbar" class="toolbar" aria-label="Category sections"></nav>
      </section>

      <section id="emptyState" class="empty-state hidden">
        <p id="emptyMessage"></p>
      </section>

      <div id="reviewContent" class="content"></div>
    </main>

    <button id="backToTopBtn" class="btn btn-secondary to-top-btn" type="button" aria-label="Back to top" title="Back to top">↑</button>

    <script src="view-attempt.js"></script>
  </body>
</html>
