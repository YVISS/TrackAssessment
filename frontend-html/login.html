<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loadingScreen" style="display:none;position:fixed;z-index:9999;top:0;left:0;width:100vw;height:100vh;background:#0a1629;align-items:center;justify-content:center;color:#fff;font-size:2rem;">Loading...</div>
    <main class="page">
      <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

      <div class="login-container">
        <div class="login-card" id="authView">
          <h1>Login</h1>

          <form id="loginForm" class="auth-form">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" placeholder="your@email.com" required />

            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="password" type="password" placeholder="Password" required />
            <div style="margin-top:8px;">
              <label style="font-size:14px;color:var(--muted);"><input id="showPassword" type="checkbox" style="margin-right:8px;vertical-align:middle;"> Show password</label>
            </div>

            <div class="card-footer">
              <div class="left"><button id="forgotToggleBtn" type="button" class="link-btn">Forgot password?</button></div>
              <div class="right"><a href="sign-up.html" id="showSignupBtn">Sign Up</a></div>
            </div>

            <button type="submit" class="primary-btn">Sign In</button>
          </form>

          <p id="authMessage" class="message" aria-live="polite"></p>
        </div>
      </div>

      <div id="logoutModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="logoutModalTitle">
        <div class="modal-card">
          <h3 id="logoutModalTitle">Are you sure you want to logout?</h3>
          <div class="modal-actions">
            <button id="confirmLogoutBtn" class="danger-btn" type="button">Yes</button>
            <button id="cancelLogoutBtn" class="secondary-btn" type="button">No</button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
      const backendBase = `${location.protocol}//${location.hostname}:8000`;
      const DASHBOARD_PAGE = 'user-dashboard.html';
      const ADMIN_PAGE = 'questions-all.html?category=' + encodeURIComponent('All Questions');

      function showMessage(msg, isError = false){
        const el = document.getElementById('authMessage');
        if (!el) return;
        el.textContent = msg || '';
        el.style.color = isError ? '#dc2626' : '';
      }

      function getSupabaseClient(){
        if (window.supabaseClient && typeof window.supabaseClient.from === 'function') return window.supabaseClient;
        if (!window.supabase || typeof window.supabase.createClient !== 'function') {
          throw new Error('Supabase library not loaded.');
        }

        const url = window.SUPABASE_URL || window.supabaseUrl || window.SUPABASE_CONFIG?.url || window.__SUPABASE_URL__;
        const anonKey = window.SUPABASE_ANON_KEY || window.supabaseAnonKey || window.supabaseKey || window.SUPABASE_CONFIG?.anonKey || window.__SUPABASE_ANON_KEY__;

        if (!url || !anonKey) throw new Error('Supabase config not found in supabase-config.js');
        window.supabaseClient = window.supabase.createClient(url, anonKey);
        return window.supabaseClient;
      }

      function normalizeProfile(row, emailFallback = ''){
        const safe = row && typeof row === 'object' ? row : {};
        const fullName = safe.full_name || safe.name || safe.fullName || safe.student_name || safe.username || '';
        const email = safe.email || emailFallback || '';
        return {
          ...safe,
          user_id: safe.user_id ?? safe.id ?? safe.userId ?? safe.uuid ?? '',
          email,
          full_name: fullName,
          name: safe.name || fullName,
          usertype: (safe.usertype || safe.user_type || safe.type || 'user').toLowerCase()
        };
      }

      function saveSession(profile){
        const safe = normalizeProfile(profile, profile?.email || '');
        sessionStorage.setItem('user_email', safe.email || '');
        sessionStorage.setItem('user_id', safe.user_id !== undefined && safe.user_id !== null ? String(safe.user_id) : '');
        sessionStorage.setItem('user_name', safe.full_name || safe.name || '');
        sessionStorage.setItem('user_profile', JSON.stringify(safe));
      }

      async function authWithPassword(email, password){
        try{
          const url = `${backendBase}/auth`;
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          if (!res.ok){
            const t = await res.text();
            throw new Error(`${res.status} ${res.statusText} - ${t}`);
          }
          return await res.json();
        }catch(err){
          console.warn('Backend auth failed:', err);
          return { error: err.message };
        }
      }

      async function fetchProfileFromBackend(email){
        try{
          const purl = `${backendBase}/user-profile?email=${encodeURIComponent(email)}`;
          const pres = await fetch(purl, { headers: { Accept: 'application/json' } });
          if (!pres.ok) return null;
          const pj = await pres.json();
          if (!pj || pj.error || !Object.keys(pj).length) return null;
          return pj;
        }catch(error){
          console.warn('Failed to fetch backend profile:', error);
          return null;
        }
      }

      async function fetchProfileFromSupabaseByEmail(email){
        const supabaseClient = getSupabaseClient();
        const columns = 'user_id, email, full_name, name, usertype, user_type, type';
        const { data, error } = await supabaseClient
          .from('users_profile')
          .select(columns)
          .eq('email', email)
          .limit(1)
          .maybeSingle();

        if (error) throw error;
        return data || null;
      }

      async function authDirectFromSupabase(email, password){
        const supabaseClient = getSupabaseClient();
        const tryColumns = [
          'user_id, email, full_name, name, usertype, user_type, type, password',
          'user_id, email, full_name, name, usertype, user_type, type, user_password'
        ];

        for (const columns of tryColumns){
          try{
            const passwordColumn = columns.includes('user_password') ? 'user_password' : 'password';
            const { data, error } = await supabaseClient
              .from('users_profile')
              .select(columns)
              .eq('email', email)
              .eq(passwordColumn, password)
              .limit(1)
              .maybeSingle();

            if (error) continue;
            if (data) return data;
          }catch(error){
            console.warn('Direct Supabase auth attempt failed:', error);
          }
        }

        return null;
      }

      async function resolveLoginProfile(email, password, authPayload){
        let profile = await fetchProfileFromBackend(email);
        if (profile) return normalizeProfile(profile, email);

        try{
          profile = await fetchProfileFromSupabaseByEmail(email);
          if (profile) return normalizeProfile(profile, email);
        }catch(error){
          console.warn('Supabase email lookup failed:', error);
        }

        const user = authPayload?.user || authPayload || {};
        return normalizeProfile(user, email);
      }

      function redirectByType(profile){
        const usertype = (profile.usertype || profile.user_type || profile.type || 'user').toLowerCase();
        window.location.href = usertype === 'admin' ? ADMIN_PAGE : DASHBOARD_PAGE;
      }

      window.addEventListener('load', () => {
        const e = document.getElementById('loginEmail');
        if (e) e.focus();
      });

      document.getElementById('loginForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value || '';
        if (!email || !password) return showMessage('Please enter email and password.', true);

        showMessage('Authenticating...');

        let authPayload = await authWithPassword(email, password);
        let directProfile = null;

        if (!authPayload || authPayload.error){
          try{
            directProfile = await authDirectFromSupabase(email, password);
          }catch(error){
            console.warn('Supabase direct auth failed:', error);
          }

          if (!directProfile){
            showMessage('Login failed. Check your email or password.', true);
            return;
          }
        }

        const profile = directProfile
          ? normalizeProfile(directProfile, email)
          : await resolveLoginProfile(email, password, authPayload);

        if (!profile.email) profile.email = email;
        saveSession(profile);
        showMessage('Login successful. Redirecting...');
        redirectByType(profile);
      });

      const showPw = document.getElementById('showPassword');
      if (showPw){
        showPw.addEventListener('change', () => {
          const p = document.getElementById('loginPassword');
          if (p) p.type = showPw.checked ? 'text' : 'password';
        });
      }
    </script>
  </body>
</html>
