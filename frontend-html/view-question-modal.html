<style>
  /* Simple view-only modal */
  #viewQaModal.qa-modal{position:fixed;inset:0;background:rgba(3,7,18,0.45);display:flex;align-items:center;justify-content:center;z-index:12000}
  #viewQaModal.qa-modal .panel{background:#fff;border-radius:12px;padding:20px;max-width:820px;width:96%;max-height:80vh;overflow:auto;box-shadow:0 18px 60px rgba(6,8,20,0.12)}
  #viewQaModal .opt-preview{width:100%;max-height:260px;object-fit:contain;border-radius:8px;border:1px solid #e6e6e9}
  #viewQaModal .choice{display:flex;align-items:center;gap:12px;margin:10px 0;padding:10px;border-radius:8px;background:#f8fafc;border:1px solid #eef2f6}
  #viewQaModal .choice img.choice-img{width:140px;height:90px;object-fit:contain;border-radius:6px}

  /* Actions (buttons) styling inside view modal */
  #viewQaModal .panel .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
  #viewQaModal .panel .actions button{padding:8px 12px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
  #viewQaModal .panel .actions button.btn-primary{background:linear-gradient(90deg,#7c3aed,#06b6d4);color:#fff}
  #viewQaModal .panel .actions button.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(124,58,237,0.12)}
  #viewQaModal .panel .actions button.btn-danger{background:linear-gradient(90deg,#ef4444,#f97316);color:#fff}
  #viewQaModal .panel .actions button.btn-danger:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(240,72,88,0.12)}
  #viewQaModal .panel .actions button.btn-secondary{background:#f1f5f9;color:#0b1724;border:1px solid #e6e9ef}
  #viewQaModal .panel .actions button:active{transform:translateY(0)}
</style>
<div class="qa-modal" id="viewQaModal" style="display:none">
  <div class="panel">
    <h3 id="viewModalTitle">View Question</h3>
    <div style="margin-bottom:10px"><strong>Question</strong>
      <div id="v_question" style="margin-top:6px;color:#0b1724"></div>
    </div>
    <div style="margin-bottom:10px"><strong>Long text / Explanation</strong>
      <div id="v_long_text" style="margin-top:6px;color:#334155"></div>
    </div>
    <div style="margin-bottom:10px"><strong>Question Image</strong>
      <div style="margin-top:6px"><img id="v_image_preview" class="opt-preview" src="" alt="Question image preview" style="display:none"/></div>
    </div>
    <div style="margin-bottom:8px"><strong>Choices</strong>
      <div id="v_choices" style="margin-top:6px"></div>
    </div>
    <div style="margin-bottom:10px"><strong>Correct Answer</strong>
      <div id="v_correct_answer" style="margin-top:6px;font-weight:700;color:#0b1724"></div>
    </div>
    <div class="actions">
      <button id="vEdit" class="btn-primary">Edit</button>
      <button id="vDelete" class="btn-danger">Delete</button>
      <button id="vClose" class="btn-secondary">Close</button>
    </div>
  </div>
</div>
