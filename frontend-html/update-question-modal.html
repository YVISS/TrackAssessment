<!-- add-question-modal.html

  Modal fragment for Add/Edit Question.
  This file contains the modal HTML only. Pages should fetch this file,
  insert its contents into the DOM, then call the page's modal initializer
  (e.g. `initializeQuestionModal(modalEl, mode, row)`) to wire events.

  Example usage:
    const res = await fetch('add-question-modal.html');
    const html = await res.text();
    const wrapper = document.createElement('div'); wrapper.innerHTML = html; document.body.appendChild(wrapper);
    const modalEl = document.getElementById('qaModal'); initializeQuestionModal(modalEl, 'add');

-->
<style>
  /* Ensure modal centers in viewport even if page styles conflict */
  #qaModal.qa-modal{position:fixed;inset:0;background:rgba(3,7,18,0.45);display:flex;align-items:center;justify-content:center;z-index:12000}
  #qaModal.qa-modal .panel{background:#fff;border-radius:10px;padding:18px;max-width:820px;width:96%;max-height:80vh;overflow:auto;box-shadow:0 12px 40px rgba(6,8,20,0.12)}
  /* Force the panel to be fixed and centered regardless of parent transforms */
  #qaModal.qa-modal .panel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%)}
  /* thumbnail sizing inside modal (ensure visible) */
  #qaModal .opt-preview{width:650px;height:150px;object-fit:contain;border-radius:6px;border:1px solid #e6e6e9}
  /* Make text inputs fill their flex containers and allow shrinking in narrow layouts */
  #qaModal .row input, #qaModal .row textarea{width:100%;min-width:0;box-sizing:border-box}
</style>
<div class="qa-modal" id="qaModal" style="display:none">
  <div class="panel">
    <h3 id="qaModalTitle">Add Question</h3>
    <div class="row"><input id="question_id" placeholder="question_id" disabled /></div>
    <div class="row"><input id="qa_question" placeholder="Question text" /></div>
     <div class="row" style="margin-bottom:8px">
        <textarea id="qa_long_text" placeholder="Long text (solution, explanation, or extra info)" rows="4" style="width:100%;padding:8px;border:1px solid #e6e6e9;border-radius:6px"></textarea>
      </div>
    <!-- Question image upload (browse + preview + view) -->
    <div class="row" style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <img id="qa_image_preview" class="opt-preview" src="" alt="Question image preview" />
      <label style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
        Browse
        <input id="qa_image_file" type="file" accept="image/*" style="display:none" />
      </label>
      <button id="qa_image_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
    </div>
    <input type="hidden" id="qa_image_src" />
    <div class="row" style="display:flex;align-items:center;gap:8px">
      <div style="flex:1"><input id="qa_opt_a" placeholder="Option A" /></div>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
      <div style="flex:1"><input id="qa_opt_b" placeholder="Option B" /></div>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
      <div style="flex:1"><input id="qa_opt_c" placeholder="Option C" /></div>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
      <div style="flex:1"><input id="qa_opt_d" placeholder="Option D" /></div>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
      <div style="flex:1"><input id="qa_opt_e" placeholder="Option E" /></div>
    </div>

    <div class="row" style="display:flex;align-items:center;gap:8px">
      <img id="qa_opt_a_preview" class="opt-preview" src="" alt="A preview" />
      <label style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
        Browse
        <input id="qa_opt_a_file" type="file" accept="image/*" style="display:none" />
      </label>
      <button id="qa_opt_a_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
    <img id="qa_opt_b_preview" class="opt-preview" src="" alt="B preview" />
        <label style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
          Browse
          <input id="qa_opt_b_file" type="file" accept="image/*" style="display:none" />
        </label>
        <button id="qa_opt_b_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
    <img id="qa_opt_c_preview" class="opt-preview" src="" alt="C preview" />
        <label style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
          Browse
          <input id="qa_opt_c_file" type="file" accept="image/*" style="display:none" />
        </label>
        <button id="qa_opt_c_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
    <img id="qa_opt_d_preview" class="opt-preview" src="" alt="D preview" />
        <label style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
          Browse
          <input id="qa_opt_d_file" type="file" accept="image/*" style="display:none" />
        </label>
        <button id="qa_opt_d_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
    </div>
    <div class="row" style="display:flex;align-items:center;gap:8px">
    <img id="qa_opt_e_preview" class="opt-preview" src="" alt="E preview" />
        <label style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
          Browse
          <input id="qa_opt_e_file" type="file" accept="image/*" style="display:none" />
        </label>
        <button id="qa_opt_e_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
    </div>
    <div class="row" style="margin-top:8px">
      <label style="display:block;margin-bottom:6px;font-weight:600;color:#0b1724">Correct Answer</label>
      <select id="qa_correct_answer" style="width:120px;padding:6px;border:1px solid #e6e6e9;border-radius:6px">
        <option value="">(none)</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
      </select>
    </div>
    <div class="actions"><button id="qaCancel">Cancel</button><button id="qaSave" class="btn-primary">Save</button></div>
  </div>
</div>
