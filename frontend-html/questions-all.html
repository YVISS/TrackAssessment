<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Questions — All</title>
  <link rel="stylesheet" href="admin.css" />
  <style>
    .category-links a.category-link{display:block;margin-bottom:8px;padding:8px 10px;border-radius:8px;text-align:center;color:#0f172a;background:#f3f4f6;border:1px solid #e6e6e9;text-decoration:none;font-weight:600}
    .category-links a.category-link.active{background:linear-gradient(90deg,#7c3aed,#06b6d4);color:#fff;border-color:transparent;box-shadow:0 8px 22px rgba(124,58,237,0.12)}
  </style>
  <style>
    /* Ensure hover glow wins: inline rules loaded after admin.css */
    .sidebar .category-links a.category-link{position:relative}
    .sidebar .category-links a.category-link:hover,
    .sidebar .category-links a.category-link:focus,
    .sidebar .category-links a.category-link:focus-visible{
      transform:translateY(-3px) !important;
      border-color: rgba(124,58,237,0.6) !important;
      color: #07182a !important;
      background: linear-gradient(90deg, rgba(124,58,237,0.10), rgba(6,182,212,0.06)) !important;
      box-shadow: 0 12px 36px rgba(124,58,237,0.12), 0 0 18px rgba(6,182,212,0.08) inset !important;
    }
    .sidebar .category-links a.category-link:hover::before,
    .sidebar .category-links a.category-link:focus::before,
    .sidebar .category-links a.category-link:focus-visible::before{
      opacity: 0.18 !important;
      transform: scale(1.02) !important;
    }
  </style>
</head>
<body>
  <script src="admin-header.v2.js"></script>
  <script src="admin-modal.js"></script>

  <div class="layout">

    <main class="main-card" id="adminContent">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <h2 style="margin:0">All Questions</h2>
        <div>
            <button id="addQuestionBtn" class="btn-primary" aria-label="Add question">Add Question</button>
        </div>
      </div>
      <div id="questionsMessage" class="muted" style="margin-bottom:12px"></div>
      <div style="overflow:visible">
        <table id="questionsTable">
          <colgroup>
            <col style="width:80px" />
            <col style="width:40%" />
            <col />
            <col style="width:180px" />
          </colgroup>
          <thead>
            <tr>
              <th>Question ID</th>
              <th>Question</th>
              <th>Long Text</th>
              <th class="actions-header">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const backendBase = `${location.protocol}//${location.hostname}:8000`;
    function syncAccent(){
      const hb = document.getElementById('adminHeaderBar');
      if (!hb) return;
      document.documentElement.style.setProperty('--admin-header-height', hb.offsetHeight + 'px');
    }
    window.addEventListener('load', syncAccent);
    window.addEventListener('resize', ()=> setTimeout(syncAccent,50));

    (function highlightCategory(){
      const links = Array.from(document.querySelectorAll('.category-links a.category-link'));
      if (!links.length) return;
      const path = window.location.pathname.split('/').pop() || 'questions-all.html';
      const normalized = (path === 'questions-all.html' || path === '') ? 'questions-all.html' : path;
      let matched = links.find(a => a.getAttribute('href') === normalized);
      if (!matched){ matched = links[0]; }
      matched.classList.add('active');
    })();

    // Fetch Table_Questions via backend proxy
    (async function loadQuestions(){
      const msgEl = document.getElementById('questionsMessage');
      const tbody = document.querySelector('#questionsTable tbody');
      try{
        msgEl.textContent = 'Loading questions…';
        const res = await fetch(`${backendBase}/questions?category=`);
        if (!res.ok){ msgEl.textContent = 'Failed to load questions: ' + res.status; return }
        const data = await res.json();
        if (!Array.isArray(data)){
          msgEl.textContent = 'No data returned';
          return;
        }
        msgEl.textContent = '';
        tbody.innerHTML = '';
        for (const row of data){
          const qid = row.question_id || row.id || '';
          const qtxt = row.question || row.question_text || '';
          const opts = [row.opt_a, row.opt_b, row.opt_c, row.opt_d, row.opt_e].filter(Boolean);

          const tr = document.createElement('tr');

          // Question ID cell
          const tdId = document.createElement('td');
          tdId.textContent = qid;
          tr.appendChild(tdId);

          // Question cell (text or image links)
          const tdQ = document.createElement('td');
          if (looksLikeUrl(qtxt)){
            const urls = splitUrls(qtxt);
            for (const u of urls){
              const img = document.createElement('img');
              img.className = 'qimg';
              img.src = u;
              img.alt = 'question image';
              tdQ.appendChild(img);
            }
          } else {
            tdQ.textContent = qtxt;
          }
          tr.appendChild(tdQ);

          // Long text cell (from Table_Questions.long_text)
          const tdLong = document.createElement('td');
          tdLong.className = 'longtext-cell';
          tdLong.textContent = row.long_text || row.longtext || '';
          tr.appendChild(tdLong);

          // Actions cell (Edit / Delete)
          const tdActions = document.createElement('td');
          tdActions.className = 'actions-cell';
          const editBtn = document.createElement('button');
          editBtn.className = 'icon-btn edit-btn';
          editBtn.title = 'Edit';
          editBtn.innerHTML = '✏️';
          editBtn.addEventListener('click', ()=> openModal('edit', row));
          editBtn.setAttribute('aria-label', 'Edit question');

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'icon-btn delete-btn';
          deleteBtn.title = 'Delete';
          deleteBtn.setAttribute('aria-label','Delete question');
          deleteBtn.innerHTML = '🗑️';
          deleteBtn.addEventListener('click', async ()=>{
            const idPart = row.id ? ` (internal id: ${row.id})` : '';
            if (!confirm(`Delete question ${qid}${idPart} — are you sure?`)) return;
            try{
              const delRes = await fetch(`${backendBase}/questions/${encodeURIComponent(row.id)}` , { method: 'DELETE' });
              if (!delRes.ok){ alert('Delete failed: ' + delRes.status); return; }
              // remove row from table
              tbody.removeChild(tr);
            }catch(e){ console.error(e); alert('Delete error'); }
          });

          tdActions.appendChild(editBtn);
          tdActions.appendChild(deleteBtn);
          tr.appendChild(tdActions);

          tbody.appendChild(tr);
        }
      }catch(e){
        msgEl.textContent = 'Error loading questions';
        console.error(e);
      }
    })();

    // --- Modal logic for Add / Edit ---
    function openModal(mode, row){
      // mode: 'add' or 'edit'
      let existing = document.getElementById('qaModal');
      if (existing) existing.remove();
      const wrapper = document.createElement('div'); wrapper.className='qa-modal'; wrapper.id='qaModal';
      const panel = document.createElement('div'); panel.className='panel';
      panel.innerHTML = `
        <h3>${mode==='add'?'Add Question':'Edit Question'}</h3>
        <div class="row"><input id="qa_question" placeholder="Question text or image URL" /></div>
        <div class="row"><input id="qa_opt_a" placeholder="Option A" /><input id="qa_opt_b" placeholder="Option B" /></div>
        <div class="row"><input id="qa_opt_c" placeholder="Option C" /><input id="qa_opt_d" placeholder="Option D" /></div>
        <div class="row"><input id="qa_opt_e" placeholder="Option E (optional)" /></div>
        <div class="actions"><button id="qaCancel">Cancel</button><button id="qaSave" class="btn-primary">Save</button></div>
      `;
      wrapper.appendChild(panel);
      // wire modal view buttons and previews
      if (window.updateModalViewButtons) updateModalViewButtons(wrapper);
      document.body.appendChild(wrapper);

      // populate if edit
      if (mode==='edit' && row){
        document.getElementById('qa_question').value = row.question || '';
        document.getElementById('qa_opt_a').value = row.opt_a || '';
        document.getElementById('qa_opt_b').value = row.opt_b || '';
        document.getElementById('qa_opt_c').value = row.opt_c || '';
        document.getElementById('qa_opt_d').value = row.opt_d || '';
        document.getElementById('qa_opt_e').value = row.opt_e || '';
      }

      document.getElementById('qaCancel').addEventListener('click', ()=> wrapper.remove());
      document.getElementById('qaSave').addEventListener('click', async ()=>{
        const payload = {
          question: document.getElementById('qa_question').value,
          opt_a: document.getElementById('qa_opt_a').value,
          opt_b: document.getElementById('qa_opt_b').value,
          opt_c: document.getElementById('qa_opt_c').value,
          opt_d: document.getElementById('qa_opt_d').value,
          opt_e: document.getElementById('qa_opt_e').value || null,
        };
        try{
          if (mode==='add'){
            const r = await fetch(`${backendBase}/questions?category=${encodeURIComponent('')}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if (!r.ok){ alert('Create failed: '+r.status); return; }
            // refresh page (simple) or insert row — reload
            location.reload();
          } else {
            const r = await fetch(`${backendBase}/questions/${encodeURIComponent(row.id)}?category=${encodeURIComponent('')}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if (!r.ok){ alert('Update failed: '+r.status); return; }
            location.reload();
          }
        }catch(e){ console.error(e); alert('Save error'); }
      });
    }

    document.getElementById('addQuestionBtn').addEventListener('click', ()=> openModal('add'));

    function looksLikeUrl(s){ if (!s) return false; return /https?:\/\//i.test(s);
    }
    function splitUrls(s){ if (!s) return []; // split common delimiters
      // URLs may be separated by spaces or | or commas
      return s.split(/\s+|\|,|,\s*/).map(x=>x.trim()).filter(x=>x.length && /https?:\/\//i.test(x));
    }

    function escapeHtml(s){ if (s === null || typeof s === 'undefined') return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

    // Floating toolbar: ensure CSS knows its height for layout adjustments
    (function updateHeaderVars(){
      const hb = document.getElementById('adminHeaderBar');
      const main = document.querySelector('.main-card');
      function apply(){
        if (!hb) return;
        // header sits at the top of the page; expose its height
        document.documentElement.style.setProperty('--admin-header-height', hb.offsetHeight + 'px');
        // ensure main content has enough top padding so header/nav doesn't overlap
        if (main) main.style.paddingTop = `calc(var(--admin-header-height) + 24px)`;
      }
      window.addEventListener('load', ()=> setTimeout(apply,50));
      window.addEventListener('resize', ()=> setTimeout(apply,80));
      setTimeout(apply,200); setTimeout(apply,800);
    })();
  </script>
</body>
</html>
