<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Questions — All</title>
  <link rel="stylesheet" href="admin.css" />
  <style>
    .category-links a.category-link{display:block;margin-bottom:8px;padding:8px 10px;border-radius:8px;text-align:center;color:#7c3aed;background:linear-gradient(90deg, rgba(124,58,237,0.06), rgba(6,182,212,0.02));border:1px solid rgba(124,58,237,0.12);text-decoration:none;font-weight:700}
    .category-links a.category-link.active{background:linear-gradient(90deg,#7c3aed,#06b6d4);color:#fff;border-color:transparent;box-shadow:0 8px 22px rgba(124,58,237,0.12)}
  </style>
  <style>
    /* Ensure hover glow wins: inline rules loaded after admin.css */
    .sidebar .category-links a.category-link{position:relative}
    .sidebar .category-links a.category-link:hover,
    .sidebar .category-links a.category-link:focus,
    .sidebar .category-links a.category-link:focus-visible{
      transform:translateY(-3px) !important;
      border-color: rgba(124,58,237,0.6) !important;
      color: #07182a !important;
      background: linear-gradient(90deg, rgba(124,58,237,0.10), rgba(6,182,212,0.06)) !important;
      box-shadow: 0 12px 36px rgba(124,58,237,0.12), 0 0 18px rgba(6,182,212,0.08) inset !important;
    }
    .sidebar .category-links a.category-link:hover::before,
    .sidebar .category-links a.category-link:focus::before,
    .sidebar .category-links a.category-link:focus-visible::before{
      opacity: 0.18 !important;
      transform: scale(1.02) !important;
    }
  </style>
</head>
<body>
  <script src="admin-header.v2.js"></script>
  <script src="admin-modal.js"></script>

  <div class="layout">

    <main class="main-card" id="adminContent">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <h2 style="margin:0">All Questions</h2>
        <div>
          <button id="addQuestionBtn" class="btn-primary" style="margin-right:8px;">Add Question</button>
          <button id="refreshQuestionsBtn" class="btn-primary" style="margin-left:8px;">Refresh</button>
        </div>
      </div>
      <div id="questionsMessage" class="muted" style="margin-bottom:12px"></div>
      <div style="overflow:visible">
        <table id="questionsTable">
          <colgroup>
            <col style="width:80px" />
            <col style="width:40%" />
            <col />
            <col style="width:180px" />
          </colgroup>
          <thead>
            <tr>
              <th>Question ID</th>
              <th>Question</th>
              <th>Long Text</th>
              <th class="actions-header">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const backendBase = `${location.protocol}//${location.hostname}:8000`;
    function syncAccent(){
      const hb = document.getElementById('adminHeaderBar');
      if (!hb) return;
      document.documentElement.style.setProperty('--admin-header-height', hb.offsetHeight + 'px');
    }
    window.addEventListener('load', syncAccent);
    window.addEventListener('resize', ()=> setTimeout(syncAccent,50));

    (function highlightCategory(){
      const links = Array.from(document.querySelectorAll('.category-links a.category-link'));
      if (!links.length) return;
      try{
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('category');
        let matched = null;
        if (cat){
          matched = links.find(a => {
            const href = a.getAttribute('href') || '';
            return href.includes('category=' + encodeURIComponent(cat)) || href.includes('category=' + cat);
          });
        }
        if (!matched){
          matched = links.find(a => (a.getAttribute('href')||'').split('?')[0].endsWith('questions-all.html')) || links[0];
        }
        if (matched) matched.classList.add('active');
      }catch(e){ links[0] && links[0].classList.add('active'); }
    })();

    // Fetch Table_Questions via backend proxy
    window.loadQuestions = async function loadQuestions(category = ''){
      const msgEl = document.getElementById('questionsMessage');
      try{
        const h2 = document.querySelector('.main-card h2');
        if (h2) h2.textContent = category && category !== '' ? category : 'All Questions';
        const addBtn = document.getElementById('addQuestionBtn');
        if (addBtn){
          if (category && category !== '') addBtn.style.display = 'inline-block';
          else addBtn.style.display = 'none';
        }
      }catch(e){}
      const tbody = document.querySelector('#questionsTable tbody');
      try{
        msgEl.textContent = 'Loading questions…';
        const res = await fetch(`${backendBase}/questions?category=${encodeURIComponent(category || '')}`);
        if (!res.ok){ msgEl.textContent = 'Failed to load questions: ' + res.status; return }
        const data = await res.json();
        if (!Array.isArray(data)){
          msgEl.textContent = 'No data returned';
          return;
        }

        window.questionsCache = window.questionsCache || {};
        window.questionsCache[category || ''] = data;
        msgEl.textContent = '';
        tbody.innerHTML = '';
        for (const row of data){
          const qid = row.question_id || row.id || '';
          const questionImageSrc = looksLikeUrl(row.question || '')
            ? row.question
            : (row.image_url || row.image || row.question_image || '');

          const qtxt = questionImageSrc ? '' : (row.question || row.question_text || '');
          const opts = [row.opt_a, row.opt_b, row.opt_c, row.opt_d, row.opt_e].filter(Boolean);

          const tr = document.createElement('tr');

          // Question ID cell
          const tdId = document.createElement('td');
          tdId.textContent = qid;
          tr.appendChild(tdId);

          // Question cell (text or image links)
          const tdQ = document.createElement('td');
          if (questionImageSrc){
            const urls = splitUrls(questionImageSrc);
            for (const u of urls){
              const img = document.createElement('img');
              img.className = 'qimg';
              img.src = u;
              img.alt = 'question image';
              tdQ.appendChild(img);
            }
          } else {
            tdQ.textContent = qtxt;
          }
          tr.appendChild(tdQ);

          // Long text cell (from Table_Questions.long_text)
          const tdLong = document.createElement('td');
          tdLong.className = 'longtext-cell';
          tdLong.textContent = row.long_text || row.longtext || '';
          tr.appendChild(tdLong);

          // Actions cell (Edit / Delete)
          const tdActions = document.createElement('td');
          tdActions.className = 'actions-cell';
          const viewBtn = document.createElement('button');
          viewBtn.className = 'icon-btn view-btn';
          viewBtn.title = 'View';
          viewBtn.innerHTML = '🔍';
          viewBtn.addEventListener('click', ()=> openViewModal(row));
          viewBtn.setAttribute('aria-label', 'View question');

          const editBtn = document.createElement('button');
          editBtn.className = 'icon-btn edit-btn';
          editBtn.title = 'Edit';
          editBtn.innerHTML = '✏️';
          editBtn.addEventListener('click', ()=> openModal('edit', row));
          editBtn.setAttribute('aria-label', 'Edit question');

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'icon-btn delete-btn';
          deleteBtn.title = 'Delete';
          deleteBtn.setAttribute('aria-label','Delete question');
          deleteBtn.innerHTML = '🗑️';
          deleteBtn.addEventListener('click', async ()=>{
            const idPart = row.question_id ? ` (question_id: ${row.question_id})` : (row.id ? ` (internal id: ${row.id})` : '');
            if (!confirm(`Delete question ${qid}${idPart} — are you sure?`)) return;
            try{
              // prefer question_id when available (backend supports deletion by question_id or id)
              const deleteKey = (row.question_id && String(row.question_id).trim()) || (row.id && String(row.id).trim());
              if (!deleteKey){ alert('Cannot determine which row to delete (missing id/question_id)'); return; }
              // include current category for server-side mapping (helps storage cleanup)
              let category = '';
              try{ const h2 = document.querySelector('.main-card h2'); if (h2 && h2.textContent && h2.textContent !== 'All Questions') category = h2.textContent.trim(); }catch(e){}
              try{ const params = new URLSearchParams(window.location.search); if (!category) category = params.get('category') || ''; }catch(e){}
              const url = `${backendBase}/questions/${encodeURIComponent(deleteKey)}?category=${encodeURIComponent(category)}`;
              const delRes = await fetch(url , { method: 'DELETE' });
              if (!delRes.ok){ let body=''; try{ body = await delRes.text(); }catch(e){} alert('Delete failed: ' + delRes.status + '\n' + body); return; }
              // Try parse JSON response for {deleted: true}
              try{
                const j = await delRes.json();
                if (j && (j.deleted === true || j.deleted === 'true' || delRes.status === 200 || delRes.status === 204)){
                  tbody.removeChild(tr);
                } else if (j && j.error){ alert('Delete failed: ' + (j.error || JSON.stringify(j))); }
                else { tbody.removeChild(tr); }
              }catch(e){ // non-json response: remove row on 200/204
                if (delRes.status === 200 || delRes.status === 204) tbody.removeChild(tr);
                else alert('Delete failed');
              }
            }catch(e){ console.error(e); alert('Delete error'); }
          });

          tdActions.appendChild(viewBtn);
          tdActions.appendChild(editBtn);
          tdActions.appendChild(deleteBtn);
          tr.appendChild(tdActions);

          tbody.appendChild(tr);
        }
      }catch(e){
        msgEl.textContent = 'Error loading questions';
        console.error(e);
      }
    };

    // initial load: prefer `category` query parameter, else `window.adminCategory`, else all
    try{
      const params = new URLSearchParams(window.location.search);
      let cat = params.get('category');
      if (!cat && window.adminCategory) cat = String(window.adminCategory).trim();
      if (!cat || cat === 'All Questions') cat = '';
      window.loadQuestions(cat);
    }catch(e){ console.error('initial load category parse failed', e); window.loadQuestions(''); }

    // wire refresh button to reload table only (no full page reload)
    try{
      const rbtn = document.getElementById('refreshQuestionsBtn');
      if (rbtn) rbtn.addEventListener('click', ()=> {
        rbtn.disabled = true; rbtn.textContent = 'Refreshing…';
        const h2 = document.querySelector('.main-card h2');
        const cat = (h2 && h2.textContent && h2.textContent !== 'All Questions') ? h2.textContent : '';
        Promise.resolve(window.loadQuestions(cat)).finally(()=>{ rbtn.disabled = false; rbtn.textContent = 'Refresh'; });
      });
    }catch(e){ console.error('refresh button wiring failed', e); }

    try{
      const addBtn = document.getElementById('addQuestionBtn');
      if (addBtn){
        addBtn.addEventListener('click', ()=> { 
          try{ openModal('add'); }catch(err){
            // fallback: navigate to fragment if modal initializer isn't present
            console.error('openModal failed, falling back to navigation', err);
            location.href = 'add-question-modal.html';
          }
        });
      }
    }catch(e){ console.error('add button wiring failed', e); }

    // --- Modal logic for Add / Edit ---
    async function openModal(mode, row){
      // Always load the full modal fragment first
      try{
        // remove old modal if already inserted before
        const oldModal = document.getElementById('qaModal');
        if (oldModal) oldModal.remove();

        const fragRes = await fetch('add-question-modal.html');
        if (!fragRes.ok) throw new Error('Failed to load add-question-modal.html');

        const html = await fragRes.text();
        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        document.body.appendChild(wrapper);

        const modalEl = document.getElementById('qaModal');
        if (!modalEl) throw new Error('qaModal not found in fragment');

        modalEl.style.display = 'flex';

        if (typeof initializeQuestionModal === 'function') {
          initializeQuestionModal(modalEl, mode, row);
        }
        if (window.updateModalViewButtons) {
          window.updateModalViewButtons(modalEl);
        }
        return;
      }catch(err){
        console.error('openModal failed:', err);
        alert('Failed to open modal.');
      }
    }

    // Add button removed on this page; Add modal not available here
        function getCurrentCategory(){
        try{
          const h2 = document.querySelector('.main-card h2');
          if (h2 && h2.textContent && h2.textContent !== 'All Questions') {
            return h2.textContent.trim();
          }
        }catch(e){}

        try{
          const params = new URLSearchParams(window.location.search);
          return params.get('category') || '';
        }catch(e){}

        return '';
      }

      function looksLikeUrl(s){
        if (!s) return false;
        s = String(s).trim();
        return /^(https?:\/\/|data:image\/|blob:)/i.test(s);
      }

      function splitUrls(s){
        if (!s) return [];
        return String(s)
          .split(/\s+|\|,|,\s*/)
          .map(x => x.trim())
          .filter(x => x.length && looksLikeUrl(x));
      }

    // View modal loader (fetches view-question-modal.html and populates it)
    async function openViewModal(row){
      let existing = document.getElementById('viewQaModal'); if (existing) existing.remove();
      try{
        const modalUrl = new URL('view-question-modal.html', location.href).toString();
        let res = null;
        try{ res = await fetch(modalUrl); }catch(err){ res = null; }
        if (!res || !res.ok){ const rootUrl = `${location.origin}/view-question-modal.html`; try{ res = await fetch(rootUrl); }catch(err){ res = null; } }
        if (!res || !res.ok){ const code = res ? res.status : 'network-error'; throw new Error('Failed to load view modal ('+code+')'); }
        const html = await res.text(); const wrapper = document.createElement('div'); wrapper.innerHTML = html; document.body.appendChild(wrapper);
        const modalEl = document.getElementById('viewQaModal'); if (!modalEl) throw new Error('View modal not found');
        modalEl.style.display = 'flex'; modalEl.style.position = 'fixed'; modalEl.style.inset = '0'; modalEl.style.alignItems = 'center'; modalEl.style.justifyContent = 'center'; modalEl.style.zIndex = '13000';
        const panelEl = modalEl.querySelector('.panel'); if (panelEl){ panelEl.style.maxHeight = '80vh'; panelEl.style.overflow = 'auto'; }
        const setText = (id, text)=>{ const el = document.getElementById(id); if (!el) return; if (looksLikeUrl(text)){ const a = document.createElement('a'); a.href = text; a.textContent = text; a.target='_blank'; el.innerHTML=''; el.appendChild(a); } else { el.textContent = text || ''; } };
        const questionImageSrc = looksLikeUrl(row.question || '')
          ? row.question
          : (row.image_url || row.image || row.question_image || '');

        setText('v_question', questionImageSrc ? '' : (row.question || ''));
        setText('v_long_text', row.long_text || row.longtext || '');

        const img = document.getElementById('v_image_preview');
        if (img){
          if (questionImageSrc){
            img.src = questionImageSrc;
            img.style.display = 'block';
          } else {
            img.style.display = 'none';
          }
        }
        const choicesEl = document.getElementById('v_choices'); if (choicesEl){ choicesEl.innerHTML = ''; const opts = [{k:'A',v:row.opt_a},{k:'B',v:row.opt_b},{k:'C',v:row.opt_c},{k:'D',v:row.opt_d},{k:'E',v:row.opt_e}]; for (const o of opts){ if (!o.v) continue; const c = document.createElement('div'); c.className='choice'; const textIsUrl = looksLikeUrl(o.v); if (textIsUrl){ const im = document.createElement('img'); im.className='choice-img'; im.src = o.v; im.alt = 'choice '+o.k; c.appendChild(im); const span = document.createElement('div'); span.textContent = o.k + ': (image)'; c.appendChild(span); } else { const span = document.createElement('div'); span.textContent = o.k + ': ' + o.v; c.appendChild(span); } choicesEl.appendChild(c); } }
        const ca = document.getElementById('v_correct_answer'); if (ca) ca.textContent = row.correct_answer || row.answer || row.correct || '';
        const closeBtn = document.getElementById('vClose'); if (closeBtn) closeBtn.addEventListener('click', ()=>{ try{ modalEl.remove(); }catch(e){} });
        const editBtn = document.getElementById('vEdit'); if (editBtn) editBtn.addEventListener('click', ()=>{ try{ modalEl.remove(); }catch(e){} openModal('edit', row); });
        const delBtn = document.getElementById('vDelete');
        if (delBtn) delBtn.addEventListener('click', () => {
          if (!confirm('Delete this question?')) return;

          (async () => {
            try {
              const deleteKey =
                (row.question_id && String(row.question_id).trim()) ||
                (row.id && String(row.id).trim());

              if (!deleteKey) {
                alert('Cannot determine which row to delete (missing id/question_id)');
                return;
              }

              const currentCategory = getCurrentCategory();
              const url = `${backendBase}/questions/${encodeURIComponent(deleteKey)}?category=${encodeURIComponent(currentCategory)}`;

              console.log('DELETE url:', url);
              console.log('deleteKey:', deleteKey);
              console.log('currentCategory:', currentCategory);
              console.log('row:', row);

              const delRes = await fetch(url, { method: 'DELETE' });

              let bodyText = '';
              try {
                bodyText = await delRes.text();
              } catch (e) {}

              console.log('DELETE status:', delRes.status);
              console.log('DELETE body:', bodyText);

              if (!delRes.ok) {
                alert('Delete failed: ' + delRes.status + '\n' + bodyText);
                return;
              }

              try { modalEl.remove(); } catch (e) {}

              if (typeof window.loadQuestions === 'function') {
                await window.loadQuestions(currentCategory);
              }
            } catch (e) {
              console.error(e);
              alert('Delete error: ' + (e.message || e));
            }
          })();
        });
      }catch(e){ console.error('openViewModal error', e); alert('Could not open view modal: '+(e && e.message? e.message : String(e))); }
    }

    function escapeHtml(s){ if (s === null || typeof s === 'undefined') return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

    // Floating toolbar: ensure CSS knows its height for layout adjustments
    (function updateHeaderVars(){
      const hb = document.getElementById('adminHeaderBar');
      const main = document.querySelector('.main-card');
      function apply(){
        if (!hb) return;
        // header sits at the top of the page; expose its height
        document.documentElement.style.setProperty('--admin-header-height', hb.offsetHeight + 'px');
        // ensure main content has enough top padding so header/nav doesn't overlap
        if (main) main.style.paddingTop = `calc(var(--admin-header-height) + 24px)`;
      }
      window.addEventListener('load', ()=> setTimeout(apply,50));
      window.addEventListener('resize', ()=> setTimeout(apply,80));
      setTimeout(apply,200); setTimeout(apply,800);
    })();
  </script>
  <script>
    function initializeQuestionModal(modalEl, mode, row){
      const title = modalEl.querySelector('#qaModalTitle'); if (title) title.textContent = mode === 'add' ? 'Add Question' : 'Edit Question';
      // set question_id prefix when adding based on current category
      try{
        const qidEl = modalEl.querySelector('#question_id');
        if (mode === 'add' && qidEl){
          let category = '';
          try{ const h2 = document.querySelector('.main-card h2'); if (h2 && h2.textContent) category = h2.textContent.trim(); }catch(e){}
          if (!category && window.adminCategory) category = String(window.adminCategory).trim();
          if (!category){ try{ const params = new URLSearchParams(window.location.search); category = params.get('category') || ''; }catch(e){} }
          function prefixFromCategory(cat){ if (!cat) return ''; cat = String(cat).toLowerCase(); if (cat.includes('numerical')) return 'NA'; if (cat.includes('verbal')) return 'VA'; if (cat.includes('clerical')) return 'CA'; if (cat.includes('entrepreneur')) return 'ET'; if (cat.includes('science')) return 'ST'; if (cat.includes('logical')) return 'LR'; if (cat.includes('mechanical')) return 'MA'; if (cat.includes('interpersonal')) return 'IST'; return ''; }
          const p = prefixFromCategory(category);
          if (!p){ qidEl.value = ''; }
          else {
            // find smallest missing numeric suffix for this prefix by querying existing questions
            (async ()=>{
              try{
                const res = await fetch(`${backendBase}/questions?category=${encodeURIComponent(category || '')}`);
                if (!res.ok){ qidEl.value = p + '001'; return; }
                const data = await res.json();
                if (!Array.isArray(data)){ qidEl.value = p + '001'; return; }
                const nums = [];
                const re = new RegExp('^' + p + '(\\d+)$','i');
                for (const r of data){ const idv = (r.question_id || '').toString(); const m = idv.match(re); if (m){ const n = parseInt(m[1],10); if (!Number.isNaN(n)) nums.push(n); } }
                nums.sort((a,b)=>a-b);
                let next = 1;
                for (let i=0;i<nums.length;i++){
                  if (nums[i] > next) break;
                  if (nums[i] === next) next++;
                }
                const formatted = String(next).padStart(3,'0');
                qidEl.value = p + formatted;
              }catch(e){ qidEl.value = p + '001'; }
            })();
          }
        }
      }catch(e){}
        const fields = ['qa_question','qa_opt_a','qa_opt_b','qa_opt_c','qa_opt_d','qa_opt_e'];
        if (mode === 'add'){
          try{ document.getElementById('qa_long_text').value = ''; }catch(e){}
          try{ document.getElementById('qa_question').value = ''; }catch(e){}
          try{ document.getElementById('qa_opt_a').value = ''; }catch(e){}
          try{ document.getElementById('qa_opt_b').value = ''; }catch(e){}
          try{ document.getElementById('qa_opt_c').value = ''; }catch(e){}
          try{ document.getElementById('qa_opt_d').value = ''; }catch(e){}
          try{ document.getElementById('qa_opt_e').value = ''; }catch(e){}
          try{ document.getElementById('qa_image_src').value = ''; }catch(e){}

          const previewIds = [
            'qa_image_preview',
            'qa_opt_a_preview',
            'qa_opt_b_preview',
            'qa_opt_c_preview',
            'qa_opt_d_preview',
            'qa_opt_e_preview'
          ];

          for (const id of previewIds){
            const el = document.getElementById(id);
            if (el){
              el.src = '';
              el.style.display = 'none';
            }
          }

          const viewBtnIds = [
            'qa_image_view',
            'qa_opt_a_view',
            'qa_opt_b_view',
            'qa_opt_c_view',
            'qa_opt_d_view',
            'qa_opt_e_view'
          ];

        for (const id of viewBtnIds){
          const btn = document.getElementById(id);
          if (btn){
            btn.disabled = true;
            btn.style.display = 'none';
          }
        }

          ['a','b','c','d','e'].forEach(letter => {
            const input = document.getElementById(`qa_opt_${letter}`);
            if (input) input.dataset.imageValue = '';
          });

          const correctSel = document.getElementById('qa_correct_answer');
          if (correctSel) correctSel.value = '';
        }

        if (mode === 'edit' && row){
          const qidEl = document.getElementById('question_id');
          if (qidEl) qidEl.value = row.question_id || row.questionId || row.id || '';
          try{ document.getElementById('qa_long_text').value = row.long_text || row.longtext || ''; }catch(e){}
          try{ document.getElementById('qa_question').value = looksLikeUrl(row.question || '') ? '' : (row.question || ''); }catch(e){}
          try{ document.getElementById('qa_opt_a').value = looksLikeUrl(row.opt_a || '') ? '' : (row.opt_a || ''); }catch(e){}
          try{ document.getElementById('qa_opt_b').value = looksLikeUrl(row.opt_b || '') ? '' : (row.opt_b || ''); }catch(e){}
          try{ document.getElementById('qa_opt_c').value = looksLikeUrl(row.opt_c || '') ? '' : (row.opt_c || ''); }catch(e){}
          try{ document.getElementById('qa_opt_d').value = looksLikeUrl(row.opt_d || '') ? '' : (row.opt_d || ''); }catch(e){}
          try{ document.getElementById('qa_opt_e').value = looksLikeUrl(row.opt_e || '') ? '' : (row.opt_e || ''); }catch(e){}
          ['a','b','c','d','e'].forEach(letter => {
              const input = document.getElementById(`qa_opt_${letter}`);
              const existing = row[`opt_${letter}`] || '';
              if (input) {
                input.dataset.imageValue = looksLikeUrl(existing) ? existing : '';
              }
            });
          const correctSel = document.getElementById('qa_correct_answer');
          if (correctSel) correctSel.value = row.correct_answer || row.answer || row.correct || '';

          const map = {
            qa_opt_a_preview: row.opt_a,
            qa_opt_b_preview: row.opt_b,
            qa_opt_c_preview: row.opt_c,
            qa_opt_d_preview: row.opt_d,
            qa_opt_e_preview: row.opt_e,
            qa_image_preview: looksLikeUrl(row.question || '')
            ? row.question
            : (row.image_url || row.image || row.question_image || '')
          };

          for (const id in map){
            const el = document.getElementById(id);
            if (el) el.src = looksLikeUrl(map[id]) ? map[id] : '';
          }

          const qprev = document.getElementById('qa_image_preview');
          const qview = document.getElementById('qa_image_view');

          if (qprev){
            qprev.style.display = qprev.src ? 'inline-block' : 'none';
          }

          if (qview){
            qview.style.display = qprev && qprev.src ? 'inline-block' : 'none';
            qview.disabled = !(qprev && qprev.src);
          }
        }

      // option preview wiring
      for (const name of fields.slice(1)){
        const inp = document.getElementById(name);
        const prev = document.getElementById(name + '_preview');
        const viewBtn = document.getElementById(name + '_view');
        if (!inp || !prev) continue;

        const imageVal = (inp.dataset.imageValue || '').trim();
        prev.src = imageVal || '';
        prev.style.display = prev.src ? 'inline-block' : 'none';

        if (viewBtn){
          viewBtn.style.display = prev.src ? 'inline-block' : 'none';
          viewBtn.disabled = !prev.src;
        }
      }
      // file browse for Option A: show local preview when user picks a file
      // file browse for Option A-E
      ['a','b','c','d','e'].forEach(letter => {
        const fileInput = document.getElementById(`qa_opt_${letter}_file`);
        const preview = document.getElementById(`qa_opt_${letter}_preview`);
        const viewBtn = document.getElementById(`qa_opt_${letter}_view`);
        const textInput = document.getElementById(`qa_opt_${letter}`);

        if (fileInput && preview){
          fileInput.addEventListener('change', ()=>{
            const f = fileInput.files && fileInput.files[0];
            if (!f) return;

            const reader = new FileReader();
            reader.onload = (e) => {
            const val = e.target.result || '';
            preview.src = val;
            preview.style.display = val ? 'inline-block' : 'none';

            if (textInput){
              textInput.dataset.imageValue = val || '';
            }

            if (viewBtn){
              viewBtn.style.display = val ? 'inline-block' : 'none';
              viewBtn.disabled = !val;
            }

            if (window.updateModalViewButtons) updateModalViewButtons(modalEl);
          };
            reader.readAsDataURL(f);
          });
        }

        if (viewBtn){
          viewBtn.addEventListener('click', ()=>{
            if (preview && preview.src) window.open(preview.src, '_blank');
          });
          viewBtn.disabled = !(preview && preview.src);
        }
      });
      // file browse for Question Image: ensure preview + hidden src update
      const qfile = document.getElementById('qa_image_file');
      const qprev = document.getElementById('qa_image_preview');
      const qview = document.getElementById('qa_image_view');
      const qhid = document.getElementById('qa_image_src');
      if (qfile && qprev){
        qfile.addEventListener('change', (evt)=>{
          const f = qfile.files && qfile.files[0];
          if (!f) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            const val = e.target.result;
            qprev.src = val;
            qprev.style.display = 'inline-block';
            if (qhid) qhid.value = val || '';
            if (qview){ qview.style.display = 'inline-block'; qview.disabled = !val; }
            if (window.updateModalViewButtons) updateModalViewButtons(modalEl);
          };
          reader.readAsDataURL(f);
        });
      }
      if (qview){ qview.addEventListener('click', ()=>{ if (qprev && qprev.src) window.open(qprev.src, '_blank'); }); qview.disabled = !(qprev && qprev.src); }

      // cancel/save
        const cancelBtn = modalEl.querySelector('#qaCancel');
        if (cancelBtn) cancelBtn.addEventListener('click', ()=>{
          try{
            modalEl.style.display = 'none';
          }catch(e){}
        });
      const saveBtn = modalEl.querySelector('#qaSave'); if (saveBtn) saveBtn.addEventListener('click', async ()=>{
        const correctSel = document.getElementById('qa_correct_answer');
        const correctErr = document.getElementById('qa_correct_error');
        if (correctErr) correctErr.style.display = 'none';
        if (correctSel && !correctSel.value){
          if (correctErr){ correctErr.textContent = 'Select a correct answer'; correctErr.style.display = 'block'; }
          else alert('Select a correct answer');
          return;
        }
        const q = document.getElementById('qa_question');
        const a = document.getElementById('qa_opt_a');
        const b = document.getElementById('qa_opt_b');
        const c = document.getElementById('qa_opt_c');
        const d = document.getElementById('qa_opt_d');
        const e = document.getElementById('qa_opt_e');
        const longTextEl = document.getElementById('qa_long_text');
        const qImageSrcEl = document.getElementById('qa_image_src');

        // QUESTION: text/long text OR image only
        const existingQuestionImage =
          (row && (looksLikeUrl(row.question || '')
            ? row.question
            : (row.image_url || row.image || row.question_image))) || '';

        const hasQuestionText = !!(
          ((q && q.value) || '').trim() ||
          ((longTextEl && longTextEl.value) || '').trim()
        );

        const hasQuestionImage = !!(
          ((qImageSrcEl && qImageSrcEl.value) || '').trim() ||
          String(existingQuestionImage || '').trim()
        );

        if (hasQuestionText && hasQuestionImage) {
          alert("You can't have both image question and question text/long text at the same time. Use only one.");
          return;
        }

        // OPTIONS A-E: text OR image only
        const optionRules = [
          { label: 'A', input: a },
          { label: 'B', input: b },
          { label: 'C', input: c },
          { label: 'D', input: d },
          { label: 'E', input: e },
        ];

        for (const opt of optionRules) {
          const textValue = ((opt.input && opt.input.value) || '').trim();
          const imageValue = ((opt.input && opt.input.dataset && opt.input.dataset.imageValue) || '').trim();

          if (textValue && imageValue) {
            alert(`Option ${opt.label} can't have both text and image at the same time. Use only one.`);
            return;
          }
        }

        const payload = {
          question: q.value || '',
          question_id: (document.getElementById('question_id') && document.getElementById('question_id').value) || null,
          long_text: document.getElementById('qa_long_text') ? document.getElementById('qa_long_text').value : null,
          opt_a: a.value || a.dataset.imageValue || ((row && row.opt_a) || ''),
          opt_b: b.value || b.dataset.imageValue || ((row && row.opt_b) || ''),
          opt_c: c.value || c.dataset.imageValue || ((row && row.opt_c) || ''),
          opt_d: d.value || d.dataset.imageValue || ((row && row.opt_d) || ''),
          opt_e: e.value || e.dataset.imageValue || ((row && row.opt_e) || null),
          image_url: (document.getElementById('qa_image_src') && document.getElementById('qa_image_src').value) || ((row && (looksLikeUrl(row.question || '') ? row.question : (row.image_url || row.image || row.question_image))) || null),
          answer: (document.getElementById('qa_correct_answer') && document.getElementById('qa_correct_answer').value) || null
        };

        try{
          const category = getCurrentCategory();

          if (mode === 'add'){
            const r = await fetch(`${backendBase}/questions?category=${encodeURIComponent(category)}`, {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify(payload)
            });
            if (!r.ok){ alert('Create failed: ' + r.status); return; }
            location.reload();
          } else {
            const editKey = (row && (row.id || row.question_id || row.questionId)) || '';
            const r = await fetch(`${backendBase}/questions/${encodeURIComponent(editKey)}?category=${encodeURIComponent(category)}`, {
              method:'PATCH',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify(payload)
            });
            if (!r.ok){ alert('Update failed: ' + r.status); return; }
            location.reload();
          }
        }catch(e){ console.error(e); alert('Save error'); }
      });
      const correctSelOn = modalEl.querySelector('#qa_correct_answer');
      if (correctSelOn){ const correctErrOn = modalEl.querySelector('#qa_correct_error'); correctSelOn.addEventListener('change', ()=>{ if (correctErrOn) correctErrOn.style.display = 'none'; }); }
    }
  </script>

    #qaModal.qa-modal .panel{background:#fff;border-radius:10px;padding:18px;max-width:820px;width:96%;max-height:80vh;overflow:auto;box-shadow:0 12px 40px rgba(6,8,20,0.12)}

    #qaModal .row input, #qaModal .row textarea{width:100%;min-width:0;box-sizing:border-box}

    <div class="qa-modal" id="qaModal" style="display:none">    <div class="panel">
      <h3 id="qaModalTitle">Add Question</h3>
      <div class="row"><input id="question_id" placeholder="question_id" disabled /></div>
      <div class="row"><input id="qa_question" placeholder="Question text" /></div>
       <div class="row" style="margin-bottom:8px">
          <textarea id="qa_long_text" placeholder="Long text (solution, explanation, or extra info)" rows="4" style="width:100%;padding:8px;border:1px solid #e6e6e9;border-radius:6px"></textarea>
        </div>
      <!-- Question image upload (browse + preview + view) -->
      <div class="row" style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <img id="qa_image_preview" class="opt-preview" src="" alt="Question image preview" />
        <label id="qa_image_browse" style="display:inline-block;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#a0a0a0;cursor:pointer;font-size:13px;color:#0b1724">
        Browse
        <input id="qa_image_file" type="file" accept="image/*" style="display:none" />
      </label>
      <button id="qa_image_view" disabled style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">View</button>
      <button id="qa_image_remove" type="button" style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #575757;background:#fff;cursor:pointer;margin-left:6px">Remove</button>
      </div>
      
      <div class="row" style="margin-top:8px">
        <label style="display:block;margin-bottom:6px;font-weight:600;color:#0b1724">Correct Answer</label>
        <select id="qa_correct_answer" style="width:120px;padding:6px;border:1px solid #e6e6e9;border-radius:6px">
          <option value="">(none)</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
          <option value="E">E</option>
        </select>
      </div>
      <div class="actions"><button id="qaCancel">Cancel</button><button id="qaSave" class="btn-primary">Save</button></div>
    </div>
  </div>
